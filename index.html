<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- iOSアプリとして動作させるための設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Prompter">
    
    <title>Voice Teleprompter Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- HTMLをマークダウンに変換するライブラリを追加 -->
    <script src="https://unpkg.com/turndown/dist/turndown.js"></script>
    <style>
        /* カスタムスクロールバー */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #prompter-text:focus { outline: none; }

        /* Markdown Styles within Prompter */
        #prompter-text h1 { font-size: 1.5em; color: #60a5fa; margin: 0.5em 0; border-bottom: 2px solid #374151; padding-bottom: 0.2em; }
        #prompter-text h2 { font-size: 1.3em; color: #93c5fd; margin: 0.8em 0 0.5em; }
        #prompter-text h3 { font-size: 1.1em; color: #bfdbfe; margin-bottom: 0.5em; }
        #prompter-text p { margin-bottom: 1em; line-height: 1.6; }
        #prompter-text ul { list-style-type: disc; padding-left: 1.5em; margin-bottom: 1em; }
        #prompter-text ol { list-style-type: decimal; padding-left: 1.5em; margin-bottom: 1em; }
        #prompter-text li { margin-bottom: 0.5em; }
        #prompter-text strong { color: #fbbf24; font-weight: 800; }
        #prompter-text em { color: #f87171; font-style: normal; font-weight: bold; }
        #prompter-text blockquote { border-left: 4px solid #4b5563; padding-left: 1em; color: #9ca3af; font-style: italic; }

        .mirror-mode { transform: scaleX(-1); }
        .controls-transition { transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out; }
        
        body { background-color: #000; color: #fff; overflow: hidden; }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .mic-active { animation: pulse-ring 2s infinite; background-color: #dc2626 !important; }
        
        #edit-modal, #list-modal { transition: opacity 0.3s; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col font-sans">

    <!-- ガイドライン（中央線） -->
    <div id="guide-line" class="fixed top-1/2 left-0 w-full h-0.5 bg-red-500 opacity-30 z-10 pointer-events-none hidden"></div>
    <div id="guide-arrow" class="fixed top-1/2 left-2 text-red-500 opacity-50 z-10 pointer-events-none hidden text-2xl">▶</div>

    <!-- ステータス表示 -->
    <div id="status-indicator" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800/80 px-4 py-2 rounded-full text-sm text-gray-300 pointer-events-none opacity-0 transition-opacity duration-300 z-20">
        待機中...
    </div>

    <!-- ===== 編集モーダル ===== -->
    <div id="edit-modal" class="fixed inset-0 bg-black/95 z-[60] hidden flex flex-col p-4 md:p-8 opacity-0">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-white">原稿の編集</h2>
            <div class="flex items-center gap-3">
                <button id="open-list-btn" class="px-3 py-2 bg-gray-700 hover:bg-gray-600 text-white rounded transition text-sm flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
                    保存した台本
                </button>
                <button id="close-modal-btn" class="text-gray-400 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
        </div>
        <!-- タイトル入力 -->
        <input type="text" id="script-title" class="w-full bg-gray-800 text-white p-3 rounded-t-lg border-b border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg" placeholder="台本のタイトル (例: 新商品プレゼン 5分版)">
        <!-- 本文入力 -->
        <textarea id="edit-textarea" class="flex-grow w-full bg-gray-800 text-white p-4 rounded-b-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg leading-relaxed font-mono" placeholder="# タイトル&#13;&#10;ここにGoogleドキュメント等から原稿を貼り付けてください。"></textarea>
        
        <div class="mt-4 flex justify-between items-center">
            <button id="new-script-btn" class="text-blue-400 hover:text-blue-300 text-sm font-bold px-2 py-1 flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                新しく書く
            </button>
            <div class="flex gap-3">
                <button id="cancel-edit-btn" class="px-4 py-2 rounded bg-gray-700 hover:bg-gray-600 transition">キャンセル</button>
                <button id="save-edit-btn" class="px-6 py-2 rounded bg-blue-600 hover:bg-blue-500 transition font-bold shadow-lg">保存して反映</button>
            </div>
        </div>
    </div>

    <!-- ===== 台本一覧モーダル ===== -->
    <div id="list-modal" class="fixed inset-0 bg-black/95 z-[70] hidden flex flex-col p-4 md:p-8 opacity-0">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-white">保存した台本一覧</h2>
            <button id="close-list-btn" class="text-gray-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>
        <div id="script-list" class="flex-grow overflow-y-auto space-y-3 no-scrollbar pb-10">
            <!-- JSでリストが生成されます -->
        </div>
    </div>

    <!-- ===== プロンプター表示エリア ===== -->
    <div class="relative flex-grow overflow-hidden bg-black">
        <div id="scroll-container" class="h-full w-full overflow-y-scroll no-scrollbar px-4 md:px-20 py-[45vh]">
            <div id="prompter-content" class="w-full max-w-4xl mx-auto">
                <div id="prompter-text" contenteditable="false" class="text-white font-bold leading-relaxed whitespace-pre-wrap outline-none border-none p-4">
                    <!-- Javascriptでコンテンツを挿入します -->
                </div>
            </div>
        </div>
    </div>

    <!-- ===== コントロールパネル ===== -->
    <div id="controls" class="fixed bottom-0 left-0 w-full bg-gray-900/90 backdrop-blur-sm border-t border-gray-700 p-4 z-50 controls-transition">
        <div class="max-w-4xl mx-auto flex flex-col gap-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <!-- 編集ボタン -->
                    <button id="edit-btn" class="flex items-center justify-center w-12 h-12 bg-blue-600 rounded-full hover:bg-blue-500 text-white shadow-lg transition" title="原稿を編集・切替">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
                    </button>
                    <!-- マイクボタン -->
                    <button id="mic-btn" class="flex items-center justify-center w-12 h-12 bg-gray-700 rounded-full hover:bg-gray-600 text-white shadow-lg transition relative" title="音声追従モード">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
                    </button>
                    <!-- 再生ボタン -->
                    <button id="play-btn" class="flex items-center justify-center w-12 h-12 bg-green-600 rounded-full hover:bg-green-500 text-white shadow-lg transition" title="自動スクロール再生">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </button>
                    <!-- 一時停止ボタン -->
                    <button id="pause-btn" class="hidden flex items-center justify-center w-12 h-12 bg-yellow-600 rounded-full hover:bg-yellow-500 text-white shadow-lg transition">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6m7-6h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                    </button>
                </div>

                <div class="flex items-center gap-2">
                    <button id="reset-btn" class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600 text-sm">先頭へ</button>
                    <button id="mirror-btn" class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600 text-sm">反転</button>
                    <button id="guide-btn" class="px-3 py-1 bg-gray-700 rounded hover:bg-gray-600 text-sm text-red-300">ガイド</button>
                </div>
            </div>

            <!-- 下段：スライダー調整 -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="flex items-center gap-3">
                    <span class="text-xs text-gray-400 w-8">速度</span>
                    <input type="range" id="speed-slider" min="1" max="10" value="3" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs text-gray-400 w-8">文字</span>
                    <input type="range" id="font-size-slider" min="20" max="120" value="60" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer">
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 要素の取得 ---
        const scrollContainer = document.getElementById('scroll-container');
        const prompterText = document.getElementById('prompter-text');
        const prompterContent = document.getElementById('prompter-content');
        
        // Modal Elements
        const editBtn = document.getElementById('edit-btn');
        const editModal = document.getElementById('edit-modal');
        const editTitle = document.getElementById('script-title');
        const editTextarea = document.getElementById('edit-textarea');
        const saveEditBtn = document.getElementById('save-edit-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const newScriptBtn = document.getElementById('new-script-btn');
        
        // List Modal Elements
        const listModal = document.getElementById('list-modal');
        const openListBtn = document.getElementById('open-list-btn');
        const closeListBtn = document.getElementById('close-list-btn');
        const scriptListContainer = document.getElementById('script-list');

        // Control Elements
        const playBtn = document.getElementById('play-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const micBtn = document.getElementById('mic-btn');
        const resetBtn = document.getElementById('reset-btn');
        const mirrorBtn = document.getElementById('mirror-btn');
        const guideBtn = document.getElementById('guide-btn');
        const speedSlider = document.getElementById('speed-slider');
        const fontSizeSlider = document.getElementById('font-size-slider');
        const controls = document.getElementById('controls');
        const guideLine = document.getElementById('guide-line');
        const guideArrow = document.getElementById('guide-arrow');
        const statusIndicator = document.getElementById('status-indicator');

        // --- 状態管理 ---
        let isScrolling = false;
        let scrollSpeed = 3;
        let animationFrameId;
        let isMirrored = false;
        let isGuideVisible = false;
        let lastScrollTime = 0;
        let isVoiceActive = false;
        let recognition = null;
        let lastFoundIndex = 0;
        
        // ローカルストレージ関連
        const STORAGE_KEY = 'teleprompter_scripts_v1';
        let currentScriptId = null;
        let currentTitle = '';
        let currentMarkdown = '';

        // --- Turndown (HTML to Markdown) 初期化 ---
        const turndownService = new TurndownService({ headingStyle: 'atx' });
        
        // Gドキュメント特有の不要なラッパータグを無効化しつつ中身は残す
        turndownService.addRule('gdocsWrapper', {
            filter: function (node) {
                return node.nodeName === 'B' && node.id && node.id.startsWith('docs-internal-guid-') && node.style.fontWeight === 'normal';
            },
            replacement: function (content) {
                return content;
            }
        });
        
        // Gドキュメントの太字（spanのスタイルとして表現される場合）を処理
        turndownService.addRule('gdocsSpanBold', {
            filter: function (node) {
                return node.nodeName === 'SPAN' && (node.style.fontWeight === '700' || node.style.fontWeight === 'bold');
            },
            replacement: function (content) {
                return '**' + content + '**';
            }
        });

        const defaultMarkdown = `# はじめての台本
ここにGoogleドキュメントなどで作成した原稿を貼り付けてください。

## このアプリの機能
左下の「鉛筆マーク」を押すと、**複数の台本を保存**できます。
本番用、リハーサル用、短縮版などを事前に作っておき、すぐに切り替えることが可能です。

---
### 💡操作のコツ
- 画面のどこかを**タップ**すると、再生・一時停止ができます。
- **マイクボタン**を押すと、あなたの声に合わせて自動スクロールします。`;

        // --- 初期設定 ---
        function init() {
            marked.setOptions({ breaks: true });
            updateFontSize();
            loadLatestScript(); // 保存されている最新の台本を読み込む
            checkSpeechSupport();
            setupModals();
        }

        // --- スマートペースト機能 (HTMLをマークダウンに自動変換) ---
        editTextarea.addEventListener('paste', (e) => {
            // クリップボードからリッチテキスト（HTML）を取得
            const html = e.clipboardData.getData('text/html');
            
            // HTMLが存在する場合（Googleドキュメント等からのコピー）
            if (html) {
                e.preventDefault(); // デフォルトのプレーンテキスト貼り付けを阻止
                
                // HTMLをマークダウン形式に変換
                let markdown = turndownService.turndown(html);
                
                // カーソルの位置に変換したマークダウンを挿入
                const start = editTextarea.selectionStart;
                const end = editTextarea.selectionEnd;
                const text = editTextarea.value;
                editTextarea.value = text.substring(0, start) + markdown + text.substring(end);
                
                // カーソルを挿入後の位置に移動
                editTextarea.selectionStart = editTextarea.selectionEnd = start + markdown.length;
                
                showStatus('書式を保持して貼り付けました');
            }
        });

        // --- ローカルストレージ機能（台本の保存・読込） ---
        function getSavedScripts() {
            try {
                const data = localStorage.getItem(STORAGE_KEY);
                return data ? JSON.parse(data) : [];
            } catch (e) {
                console.error("Storage read error:", e);
                return [];
            }
        }

        function saveScriptsToStorage(scripts) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(scripts));
            } catch (e) {
                console.error("Storage write error:", e);
                alert("保存容量がいっぱいです。不要な台本を削除してください。");
            }
        }

        function loadLatestScript() {
            const scripts = getSavedScripts();
            if (scripts.length > 0) {
                scripts.sort((a, b) => b.updatedAt - a.updatedAt);
                const latest = scripts[0];
                currentScriptId = latest.id;
                currentTitle = latest.title;
                currentMarkdown = latest.content;
            } else {
                currentScriptId = null;
                currentTitle = 'はじめての台本';
                currentMarkdown = defaultMarkdown;
            }
            renderMarkdown();
        }

        function saveCurrentScript(title, content) {
            let scripts = getSavedScripts();
            const saveTitle = title.trim() || '無題の台本 ' + new Date().toLocaleDateString();
            
            if (currentScriptId) {
                const index = scripts.findIndex(s => s.id === currentScriptId);
                if (index !== -1) {
                    scripts[index].title = saveTitle;
                    scripts[index].content = content;
                    scripts[index].updatedAt = Date.now();
                } else {
                    scripts.push({ id: currentScriptId, title: saveTitle, content: content, updatedAt: Date.now() });
                }
            } else {
                currentScriptId = Date.now().toString();
                scripts.push({ id: currentScriptId, title: saveTitle, content: content, updatedAt: Date.now() });
            }
            
            saveScriptsToStorage(scripts);
            currentTitle = saveTitle;
            currentMarkdown = content;
            renderMarkdown();
            showStatus('台本を保存しました');
        }

        // グローバルに関数を公開（HTML内のonclickで呼ぶため）
        window.loadScriptFromId = function(id) {
            const scripts = getSavedScripts();
            const script = scripts.find(s => s.id === id);
            if (script) {
                currentScriptId = script.id;
                currentTitle = script.title;
                currentMarkdown = script.content;
                
                // 編集画面にもセット
                editTitle.value = currentTitle;
                editTextarea.value = currentMarkdown;
                
                renderMarkdown();
                closeListModal();
                closeEditModal();
                showStatus('「' + currentTitle + '」を読み込みました');
                scrollContainer.scrollTo({ top: 0 }); // 先頭に戻す
            }
        };

        window.deleteScript = function(id, event) {
            event.stopPropagation();
            if (!confirm('この台本を完全に削除しますか？')) return;
            
            let scripts = getSavedScripts();
            scripts = scripts.filter(s => s.id !== id);
            saveScriptsToStorage(scripts);
            
            // 現在開いているものを削除した場合、新規作成状態にする
            if (currentScriptId === id) {
                currentScriptId = null;
                currentTitle = '';
                currentMarkdown = '';
                editTitle.value = '';
                editTextarea.value = '';
                renderMarkdown();
            }
            renderScriptList(); // リストを再描画
        };

        function renderMarkdown() {
            prompterText.innerHTML = marked.parse(currentMarkdown);
        }

        // --- モーダル制御 ---
        function setupModals() {
            // Edit Modal
            editBtn.addEventListener('click', (e) => {
                e.stopPropagation(); 
                editTitle.value = currentTitle;
                editTextarea.value = currentMarkdown;
                
                editModal.classList.remove('hidden');
                void editModal.offsetWidth; 
                editModal.classList.remove('opacity-0');
                if (isScrolling) stopScroll();
            });

            window.closeEditModal = function() {
                editModal.classList.add('opacity-0');
                setTimeout(() => editModal.classList.add('hidden'), 300);
            }

            saveEditBtn.addEventListener('click', () => {
                saveCurrentScript(editTitle.value, editTextarea.value);
                closeEditModal();
            });

            cancelEditBtn.addEventListener('click', closeEditModal);
            closeModalBtn.addEventListener('click', closeEditModal);
            
            // 新規作成ボタン
            newScriptBtn.addEventListener('click', () => {
                currentScriptId = null;
                editTitle.value = '';
                editTextarea.value = '';
                editTitle.focus();
            });

            // List Modal
            openListBtn.addEventListener('click', () => {
                renderScriptList();
                listModal.classList.remove('hidden');
                void listModal.offsetWidth;
                listModal.classList.remove('opacity-0');
            });

            window.closeListModal = function() {
                listModal.classList.add('opacity-0');
                setTimeout(() => listModal.classList.add('hidden'), 300);
            }

            closeListBtn.addEventListener('click', closeListModal);
        }

        function renderScriptList() {
            const scripts = getSavedScripts();
            scriptListContainer.innerHTML = '';

            if (scripts.length === 0) {
                scriptListContainer.innerHTML = '<p class="text-gray-400 text-center py-10">保存された台本はありません。</p>';
                return;
            }

            // 新しい順にソート
            scripts.sort((a, b) => b.updatedAt - a.updatedAt);

            scripts.forEach(script => {
                const date = new Date(script.updatedAt);
                const dateStr = `${date.getMonth()+1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')}`;
                const isActive = script.id === currentScriptId;
                
                const item = document.createElement('div');
                item.className = `p-4 rounded-lg flex justify-between items-center group transition ${isActive ? 'bg-blue-900/50 border border-blue-500' : 'bg-gray-800 hover:bg-gray-700'}`;
                
                item.innerHTML = `
                    <div class="cursor-pointer flex-grow" onclick="loadScriptFromId('${script.id}')">
                        <div class="flex items-center gap-2">
                            <h3 class="text-white font-bold text-lg truncate">${script.title}</h3>
                            ${isActive ? '<span class="text-xs bg-blue-600 text-white px-2 py-0.5 rounded">選択中</span>' : ''}
                        </div>
                        <p class="text-gray-400 text-sm mt-1">最終更新: ${dateStr}</p>
                    </div>
                    <button onclick="deleteScript('${script.id}', event)" class="text-gray-500 hover:text-red-500 p-3 transition" title="削除">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                `;
                scriptListContainer.appendChild(item);
            });
        }

        // --- 音声認識機能（エラーハンドリング強化版） ---
        function checkSpeechSupport() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                micBtn.style.display = 'none';
            }
        }

        function setupRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'ja-JP';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = function() {
                isVoiceActive = true;
                micBtn.classList.add('mic-active');
                showStatus('音声認識中...');
                if(isScrolling) stopScroll();
            };

            recognition.onend = function() {
                if (isVoiceActive) {
                    try { recognition.start(); } 
                    catch(e) { 
                        if (e.name !== 'InvalidStateError') {
                            isVoiceActive = false;
                            micBtn.classList.remove('mic-active');
                        }
                    }
                } else {
                    micBtn.classList.remove('mic-active');
                    showStatus('音声認識停止');
                }
            };

            recognition.onresult = function(event) {
                let finalTranscript = '';
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                    else interimTranscript += event.results[i][0].transcript;
                }
                const transcript = finalTranscript || interimTranscript;
                if (transcript.length > 1) scrollToSpokenWord(transcript);
            };

            recognition.onerror = function(event) {
                if (event.error === 'not-allowed') {
                    showStatus('マイクの使用が許可されていません');
                    isVoiceActive = false;
                    micBtn.classList.remove('mic-active');
                }
            };
        }

        function toggleVoice(e) {
            e.stopPropagation(); 
            if (!recognition) setupRecognition();

            if (isVoiceActive) {
                isVoiceActive = false;
                try { recognition.stop(); } catch(err) {}
            } else {
                try { recognition.start(); } 
                catch(e) {
                    if (e.name === 'InvalidStateError') {
                        isVoiceActive = true;
                        micBtn.classList.add('mic-active');
                    }
                }
            }
        }

        function scrollToSpokenWord(transcript) {
            const cleanTranscript = transcript.replace(/[、。！？\s]/g, '');
            if (!cleanTranscript) return;
            const searchKey = cleanTranscript.slice(-10); 
            const foundRange = findTextRange(searchKey, lastFoundIndex);
            
            if (foundRange) {
                const rect = foundRange.getBoundingClientRect();
                const offset = scrollContainer.scrollTop + rect.top - (window.innerHeight / 2.5);
                scrollContainer.scrollTo({ top: offset, behavior: 'smooth' });
                showStatus('認識: ' + foundRange.toString());
            }
        }

        function findTextRange(searchText, startIndex) {
            if (!searchText) return null;
            const walker = document.createTreeWalker(prompterText, NodeFilter.SHOW_TEXT, null, false);
            while(walker.nextNode()) {
                const node = walker.currentNode;
                const cleanText = node.textContent.replace(/[\n\r]/g, ''); 
                const index = cleanText.indexOf(searchText);
                if (index !== -1) {
                    const range = document.createRange();
                    range.setStart(node, index);
                    range.setEnd(node, Math.min(index + searchText.length, node.length));
                    return range;
                }
            }
            return null;
        }

        function showStatus(msg) {
            statusIndicator.textContent = msg;
            statusIndicator.style.opacity = '1';
            clearTimeout(window.statusTimer);
            window.statusTimer = setTimeout(() => { statusIndicator.style.opacity = '0'; }, 3000);
        }

        // --- スクロール・コントロール機能 ---
        function autoScroll(timestamp) {
            if (!isScrolling) return;
            if (timestamp - lastScrollTime >= 16) {
                scrollContainer.scrollTop += scrollSpeed * 0.4;
                lastScrollTime = timestamp;
            }
            animationFrameId = requestAnimationFrame(autoScroll);
        }

        function startScroll() {
            if (isVoiceActive) {
                isVoiceActive = false;
                try { recognition.stop(); } catch(e) {}
                micBtn.classList.remove('mic-active');
            }
            isScrolling = true;
            playBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            controls.style.transform = 'translateY(100%)';
            controls.style.opacity = '0';
            lastScrollTime = performance.now();
            animationFrameId = requestAnimationFrame(autoScroll);
        }

        function stopScroll() {
            isScrolling = false;
            playBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
            controls.style.transform = 'translateY(0)';
            controls.style.opacity = '1';
            cancelAnimationFrame(animationFrameId);
        }

        // イベントリスナー登録
        micBtn.addEventListener('click', toggleVoice);
        playBtn.addEventListener('click', (e) => { e.stopPropagation(); startScroll(); });
        pauseBtn.addEventListener('click', (e) => { e.stopPropagation(); stopScroll(); });

        resetBtn.addEventListener('click', (e) => {
            e.stopPropagation(); stopScroll(); scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
        });

        speedSlider.addEventListener('input', (e) => scrollSpeed = parseInt(e.target.value));
        speedSlider.addEventListener('click', (e) => e.stopPropagation());

        fontSizeSlider.addEventListener('input', updateFontSize);
        fontSizeSlider.addEventListener('click', (e) => e.stopPropagation());
        function updateFontSize() { prompterText.style.fontSize = `${fontSizeSlider.value}px`; }

        mirrorBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isMirrored = !isMirrored;
            prompterContent.classList.toggle('mirror-mode', isMirrored);
            mirrorBtn.classList.toggle('bg-green-600', isMirrored);
            mirrorBtn.classList.toggle('text-white', isMirrored);
            mirrorBtn.classList.toggle('bg-gray-700', !isMirrored);
        });

        guideBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            isGuideVisible = !isGuideVisible;
            guideLine.classList.toggle('hidden', !isGuideVisible);
            guideArrow.classList.toggle('hidden', !isGuideVisible);
            guideBtn.classList.toggle('text-red-500', isGuideVisible);
            guideBtn.classList.toggle('font-bold', isGuideVisible);
            guideBtn.classList.toggle('text-red-300', !isGuideVisible);
        });

        // 画面タップで再生/停止
        scrollContainer.addEventListener('click', (e) => {
            if (!editModal.classList.contains('hidden') || !listModal.classList.contains('hidden')) return;
            if (e.target === scrollContainer || e.target.closest('#prompter-content')) {
                isScrolling ? stopScroll() : startScroll();
            }
        });

        controls.addEventListener('click', (e) => e.stopPropagation());

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && document.activeElement !== editTextarea && document.activeElement !== editTitle) {
                e.preventDefault();
                isScrolling ? stopScroll() : startScroll();
            }
        });

        init();
    </script>
</body>
</html>
